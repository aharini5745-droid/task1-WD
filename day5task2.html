<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Task 2</title>
    <link rel="icon" href="Image/harini.png">
</head>
<body style="background-color: #b3ea0f; font-family: Arial;">
    <h1 style="color: blue;">GeeksforGeeks</h1>
    <h3 style="color: green;">Basic form design using HTML</h3>
    <form action="" align="">
        <fieldset>
            <legend>Personal details</legend>
            
            <table>
                <tr>
                    <td>First name:</td>
                    <td><input type="text"></td>
                </tr>
                <tr>
                    <td>Last name:</td>
                    <td><input type="text" name="" id=""></td>
                </tr>
                <tr>
                    <td>Gender:</td>
                    <td><label style="color: blue;"><input type="radio" name="gender" value="male"> Male</label> <label style="color: rgb(221, 20, 180);"><input type="radio" name="gender" value="female"> Female</label></td>
                </tr>
                <tr>
                    <td>Email:</td>
                    <td><input type="email"></td>
                </tr>
                <tr>
                    <td>Date of Birth:</td>
                    <td><input type="date"></td>
                </tr>
                <tr>
                    <td colspan="2">Address:</td> 
                </tr>
                <tr>
                    <td colspan="2">
                        <textarea ></textarea>
                    </td>
                </tr>
                <tr>
                    <td colspan="2"><button type="submit">Submit</button></td>
                </tr>
            </table>
        </fieldset>
    </form>
</body>
</html>
